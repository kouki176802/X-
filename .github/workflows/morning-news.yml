name: Morning news psychology drafts

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Stop after three trial mornings
        id: trial_window
        run: |
          jst_today=$(TZ=Asia/Tokyo date +%F)
          if [ "$jst_today" \> "2026-05-13" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Trial window ended on 2026-05-13 JST."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate and post drafts
        if: steps.trial_window.outputs.run == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.2' }}
          OPENAI_TIMEOUT_SECONDS: "300"
          NEWS_ITEM_COUNT: "10"
        run: python scripts/morning_news.py
